<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTrack - Elevate Your Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --bg: #F8FAFC;
            --text: #1E293B;
            --text-light: #64748B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            padding: 2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 4rem 10%;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-light);
            max-width: 600px;
            margin-bottom: 2rem;
        }
        .cta-button {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 99px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }
        .cta-button:hover {
            transform: translateY(-2px);
            background-color: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.23);
        }
        .hero-image {
            margin-top: 4rem;
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 8rem;
            padding: 4rem 10%;
            background: white;
            border-top: 1px solid #E2E8F0;
            text-align: center;
        }
        .footer-links {
            margin-top: 1rem;
        }
        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 1rem;
            font-size: 0.9rem;
        }
        .footer-links a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">StudyTrack</div>
    </nav>

    <section class="hero">
        <h1>Master Your Time,<br>Elevate Your Study</h1>
        <p>The premium timer app designed for deep focus and consistent growth. Track your stats, earn achievements, and stay motivated.</p>
        <a href="#" class="cta-button">Download StudyTrack</a>
        <img src="hero.png" alt="StudyTrack Hero" class="hero-image">
    </section>

    <footer>
        <p>&copy; 2026 StudyTrack. All rights reserved.</p>
        <div class="footer-links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="app-ads.txt">Ad Verification</a>
        </div>
    </footer>
</body>
</html>
